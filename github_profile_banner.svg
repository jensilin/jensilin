<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Jensilin Jino J C - Python developer, telecom and OSS enthusiast</title>
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a1120"/>
    <stop offset="100%" stop-color="#0d1b2e"/>
  </linearGradient>
  <clipPath id="cardClip">
    <rect x="0" y="0" width="900" height="300" rx="18"/>
  </clipPath>
</defs>

<style>
  .name { font-family: 'Courier New', monospace; font-size: 34px; font-weight: bold; fill: #eaf1fb; }
  .cursor { fill: #4fd1c5; animation: blink 1s steps(1) infinite; }
  .role { font-family: 'Courier New', monospace; font-size: 18px; fill: #4fd1c5; }
  .role-item { animation: cycle 8s infinite; opacity: 0; }
  .role-item:nth-child(1) { animation-delay: 0s; }
  .role-item:nth-child(2) { animation-delay: 2s; }
  .role-item:nth-child(3) { animation-delay: 4s; }
  .role-item:nth-child(4) { animation-delay: 6s; }
  .badge-bg { fill: #12233c; stroke: #2c5b82; stroke-width: 1; }
  .badge-text { font-family: Arial, sans-serif; font-size: 12px; fill: #a9c6e8; }
  .badge { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
  .dot { fill: #4fd1c5; }
  .pulse { animation: pulse 3s ease-in-out infinite; }
  .line { stroke: #1f4a6b; stroke-width: 1; opacity: 0.5; }
  .tagline { font-family: Arial, sans-serif; font-size: 13px; fill: #6f8bab; letter-spacing: 2px; }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes cycle {
    0% { opacity: 0; }
    5% { opacity: 1; }
    20% { opacity: 1; }
    25% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; r: 2; }
    50% { opacity: 1; r: 3.2; }
  }
</style>

<g clip-path="url(#cardClip)">
  <rect x="0" y="0" width="900" height="300" fill="url(#bgGrad)"/>

  <g>
    <line class="line" x1="600" y1="40" x2="700" y2="90"/>
    <line class="line" x1="700" y1="90" x2="820" y2="60"/>
    <line class="line" x1="700" y1="90" x2="720" y2="180"/>
    <line class="line" x1="720" y1="180" x2="840" y2="200"/>
    <line class="line" x1="720" y1="180" x2="640" y2="240"/>
    <line class="line" x1="600" y1="40" x2="560" y2="140"/>
    <line class="line" x1="560" y1="140" x2="640" y2="240"/>
    <line class="line" x1="820" y1="60" x2="860" y2="140"/>
    <line class="line" x1="860" y1="140" x2="840" y2="200"/>

    <circle class="dot pulse" cx="600" cy="40" r="3"/>
    <circle class="dot pulse" cx="700" cy="90" r="3" style="animation-delay:0.4s"/>
    <circle class="dot pulse" cx="820" cy="60" r="3" style="animation-delay:0.8s"/>
    <circle class="dot pulse" cx="720" cy="180" r="3" style="animation-delay:1.2s"/>
    <circle class="dot pulse" cx="840" cy="200" r="3" style="animation-delay:1.6s"/>
    <circle class="dot pulse" cx="640" cy="240" r="3" style="animation-delay:2.0s"/>
    <circle class="dot pulse" cx="560" cy="140" r="3" style="animation-delay:2.4s"/>
    <circle class="dot pulse" cx="860" cy="140" r="3" style="animation-delay:2.8s"/>
  </g>

  <text x="50" y="110" class="name">Jensilin Jino J C<tspan class="cursor">_</tspan></text>

  <g>
    <text x="50" y="150" class="role role-item">&gt; Python developer</text>
    <text x="50" y="150" class="role role-item">&gt; Telecom &amp; OSS enthusiast</text>
    <text x="50" y="150" class="role role-item">&gt; Automation builder</text>
    <text x="50" y="150" class="role role-item">&gt; Always learning something new</text>
  </g>

  <text x="50" y="185" class="tagline">CODE • AUTOMATE • OPTIMIZE • ITERATE</text>

  <g>
    <g class="badge" style="animation-delay:0.3s">
      <rect x="50" y="220" width="68" height="26" rx="13" class="badge-bg"/>
      <text x="84" y="237" text-anchor="middle" class="badge-text">Python</text>
    </g>
    <g class="badge" style="animation-delay:0.5s">
      <rect x="126" y="220" width="52" height="26" rx="13" class="badge-bg"/>
      <text x="152" y="237" text-anchor="middle" class="badge-text">SQL</text>
    </g>
    <g class="badge" style="animation-delay:0.7s">
      <rect x="186" y="220" width="72" height="26" rx="13" class="badge-bg"/>
      <text x="222" y="237" text-anchor="middle" class="badge-text">Docker</text>
    </g>
    <g class="badge" style="animation-delay:0.9s">
      <rect x="266" y="220" width="100" height="26" rx="13" class="badge-bg"/>
      <text x="316" y="237" text-anchor="middle" class="badge-text">Kubernetes</text>
    </g>
    <g class="badge" style="animation-delay:1.1s">
      <rect x="374" y="220" width="98" height="26" rx="13" class="badge-bg"/>
      <text x="423" y="237" text-anchor="middle" class="badge-text">Apache NiFi</text>
    </g>
    <g class="badge" style="animation-delay:1.3s">
      <rect x="480" y="220" width="60" height="26" rx="13" class="badge-bg"/>
      <text x="510" y="237" text-anchor="middle" class="badge-text">Linux</text>
    </g>
  </g>

  <line x1="0" y1="299" x2="900" y2="299" stroke="#1a3350" stroke-width="1"/>
</g>
</svg>
